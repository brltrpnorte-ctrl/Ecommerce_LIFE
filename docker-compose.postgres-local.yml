services:
  db:
    image: postgres:16
    container_name: ecommerce-life-postgres-local
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_STRONG_LOCAL_PASSWORD}
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata_local:
