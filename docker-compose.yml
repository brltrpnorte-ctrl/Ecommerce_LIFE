services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-life-postgres
    environment:
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_secure_password
      POSTGRES_DB: ecommerce_life
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecommerce_user -d ecommerce_life']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
